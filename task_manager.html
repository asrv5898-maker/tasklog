<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 관리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;
  --border:#e2e0d8;--border2:#ccc9be;
  --text:#1a1917;--text2:#6b6860;--text3:#a09e98;
  --accent:#2d4a3e;--accent-light:#e8f0ec;
  --accent2:#c4873a;--accent2-light:#faf0e4;
  --danger:#c0392b;--danger-light:#fdf0ef;
  --r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}

/* ── 레이아웃 ── */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;flex-shrink:0;background:var(--accent);display:flex;flex-direction:column;padding:28px 0 20px}
.sidebar-logo{padding:0 20px 24px;font-size:13px;font-weight:700;color:#fff;letter-spacing:.08em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:12px}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-item.active{color:#fff;background:rgba(255,255,255,.15);font-weight:500}
.sidebar-footer{margin-top:auto;padding:14px 20px 0;border-top:1px solid rgba(255,255,255,.12);font-size:11px;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace;word-break:break-all}
.main{flex:1;overflow-y:auto;padding:32px 36px}

/* ── 모바일 ── */
@media(max-width:680px){
  .shell{flex-direction:column;height:auto;min-height:100vh}
  .sidebar{width:100%;flex-direction:row;align-items:center;flex-wrap:nowrap;padding:0;overflow-x:auto;gap:0}
  .sidebar-logo{padding:12px 16px;border-bottom:none;border-right:1px solid rgba(255,255,255,.2);margin-bottom:0;margin-right:0;white-space:nowrap;font-size:12px}
  .nav-item{width:auto;padding:14px 16px;font-size:13px;white-space:nowrap;flex-shrink:0}
  .sidebar-footer{display:none}
  .main{padding:16px 14px}
  .form-row{grid-template-columns:1fr}
  .task-actions{flex-wrap:wrap;gap:6px}
  .stats{grid-template-columns:repeat(3,1fr);gap:8px}
  .stat{padding:10px 12px}
  .stat-value{font-size:18px}
  .page-title{font-size:17px;margin-bottom:16px}
  .filter-bar{flex-direction:column;align-items:flex-start !important;gap:10px !important}
  .filter-group{flex-wrap:wrap}
  .modal{width:95vw !important;padding:18px}
  .task-item{padding:14px}
}

/* ── 페이지 ── */
.page{display:none}.page.active{display:block}
.page-title{font-size:20px;font-weight:700;margin-bottom:22px;display:flex;align-items:center;gap:10px}
.page-title span{font-size:13px;font-weight:400;color:var(--text3)}

/* ── 폼 ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px;margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{margin-bottom:14px}
.form-group:last-child{margin-bottom:0}
label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;letter-spacing:.03em;text-transform:uppercase}
input[type=text],input[type=date],select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--text);background:var(--surface);font-family:'Noto Sans KR',sans-serif;transition:border-color .15s;outline:none}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px;line-height:1.7}

/* ── 버튼 ── */
.btn{padding:8px 14px;border-radius:var(--r);font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
.btn-accent:hover{background:#1e3429;border-color:#1e3429;color:#fff}
.btn-full{width:100%;justify-content:center;padding:12px;font-size:15px}
.btn-danger{color:var(--danger);border-color:transparent}
.btn-danger:hover{background:var(--danger-light)}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:6px}

/* ── 이미지 ── */
.img-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.img-grid{display:flex;flex-wrap:wrap;gap:8px}
.img-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;border:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.img-thumb:hover{opacity:.8}

/* ── 업무 카드 ── */
.task-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:0;transition:all .15s}
.task-item.dated{background:#e8f5e9 !important;border:2px solid #4caf7d !important;}
.task-item:hover{border-color:var(--border2)}
.task-title-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.task-title-text{font-size:16px;font-weight:700;color:var(--accent);line-height:1.4}
.task-content-text{font-size:14px;color:var(--text);line-height:1.7;white-space:pre-wrap;background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:10px;border:1px solid var(--border)}
.task-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.task-actions{display:flex;gap:6px;flex-wrap:wrap}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.tag.date-set{background:var(--accent-light);color:var(--accent);border-color:#b8d5c4}
.tag.date-none{background:var(--accent2-light);color:var(--accent2);border-color:#e8c990}
.task-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.task-section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}

/* ── 논의 프리뷰 ── */
.disc-bubble-preview{background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid var(--border2)}
.disc-bubble-preview-meta{font-size:11px;color:var(--text3);margin-bottom:3px}
.disc-bubble-preview-text{font-size:13px;color:var(--text);line-height:1.6}

/* ── 통계 ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}

/* ── 업무 그리드 ── */
.task-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-items:start}
@media(max-width:1100px){.task-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.task-grid{grid-template-columns:1fr}}

/* ── 인라인 편집 ── */
.edit-field{width:100%;padding:8px 10px;border:1px solid var(--accent);border-radius:var(--r);font-size:13px;color:var(--text);background:#fff;font-family:'Noto Sans KR',sans-serif;outline:none}
.edit-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,74,62,.1)}

/* ── 공휴일 ── */
.holiday-name{font-size:9px;color:#dc2626;font-weight:600;line-height:1.2;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.cal-cell.holiday .cal-day{color:#dc2626}
.cal-cell.sunday .cal-day{color:#dc2626}
.cal-cell.saturday .cal-day{color:#3b82f6}

/* ── 달력 ── */
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month{font-size:16px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:11px;color:var(--text3);padding:6px 0;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.cal-cell{min-height:54px;padding:5px;border-radius:8px;cursor:pointer;transition:background .1s}
.cal-cell:hover{background:var(--surface2)}
.cal-cell.other{opacity:.3}
.cal-cell.today .cal-day{background:var(--accent);color:#fff;border-radius:50%}
.cal-day{width:24px;height:24px;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}
.cal-cell.has-tasks{border:1.5px solid transparent}
.space-chip{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500;margin-top:3px;margin-right:2px;white-space:nowrap}
.cal-legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.cal-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.cal-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;margin-top:14px}
.cal-detail-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:12px}
.cal-task-row{padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.cal-task-content{font-size:13px;font-weight:500}
.cal-task-meta{font-size:11px;color:var(--text3);margin-top:3px}

/* ── 모달 공통 ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--rl);padding:24px;width:440px;max-width:94vw;border:1px solid var(--border);max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:18px;color:var(--text)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.disc-thread{max-height:220px;overflow-y:auto;margin-bottom:14px}
.disc-bubble{padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:6px;border:1px solid var(--border)}
.disc-bubble-meta{font-size:11px;color:var(--text3);margin-bottom:3px}
.disc-bubble-text{font-size:13px}

/* ── 그림판 ── */
.paint-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.paint-overlay.open{display:flex}
.paint-box{background:var(--surface);border-radius:var(--rl);padding:18px;border:1px solid var(--border);width:680px;max-width:96vw}
.paint-toolbar{display:flex;gap:5px;align-items:center;flex-wrap:wrap;padding:10px 12px;background:var(--surface2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:10px}
.ptool{padding:5px 10px;font-size:12px;border-radius:6px;cursor:pointer;border:1px solid transparent;background:none;color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all .12s}
.ptool:hover{background:var(--surface);border-color:var(--border)}
.ptool.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pdiv{width:1px;height:20px;background:var(--border);margin:0 2px}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:transform .1s}
.swatch:hover{transform:scale(1.15)}
.swatch.active{border-color:var(--text)}
.paint-canvas-wrap{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:crosshair;background:#fff}
.paint-canvas-wrap canvas{display:block;max-width:100%}
.paint-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}

.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
.empty strong{display:block;font-size:16px;color:var(--text2);margin-bottom:6px}

/* ── 체크리스트 ── */
.checklist-input-row{display:flex;gap:6px;margin-bottom:6px}
.checklist-input-row input{flex:1;padding:7px 10px;font-size:13px}
.checklist-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface2);border-radius:7px;margin-bottom:5px;border:1px solid var(--border);transition:background .1s}
.checklist-item.done{background:var(--accent-light)}
.checklist-item.done .cl-text{text-decoration:line-through;color:var(--text3)}
.cl-check{width:16px;height:16px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.cl-text{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.cl-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 2px;line-height:1}
.cl-del:hover{color:var(--danger)}
.cl-progress{font-size:11px;color:var(--text3);margin-bottom:6px}
.cl-progress span{font-weight:600;color:var(--accent)}
</style>
</head>
<body>
<div class="shell">

  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="sidebar-logo">TASKLOG</div>
    <button class="nav-item active" onclick="goTo('create')"><span>✦</span> 업무 생성</button>
    <button class="nav-item" onclick="goTo('list')"><span>≡</span> 날짜 배정</button>
    <button class="nav-item" onclick="goTo('calendar')"><span>◫</span> 달력 확인</button>
    <div class="sidebar-footer" id="save-status">준비 중...</div>
  </div>

  <!-- 메인 -->
  <div class="main">

    <!-- 업무 생성 -->
    <div class="page active" id="page-create">
      <div class="page-title">업무 생성 <span>새 업무를 등록합니다</span></div>
      <div class="card">
        <div class="form-group"><label>제목 <span style="font-size:11px;color:var(--text3);text-transform:none;letter-spacing:0">달력에 표시될 짧은 이름</span></label><input type="text" id="f-title" placeholder="예: 조명 교체, 바닥 마감 점검" maxlength="20"></div>
        <div class="form-row">
          <div class="form-group"><label>공간</label><input type="text" id="f-space" placeholder="예: 본관 2층"></div>
          <div class="form-group"><label>Zone</label><input type="text" id="f-zone" placeholder="예: Zone A"></div>
        </div>
        <div class="form-group"><label>내용</label><textarea id="f-content" placeholder="업무 내용을 상세히 입력하세요" style="min-height:100px"></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>작업자</label><input type="text" id="f-worker" placeholder="실제 작업하는 사람"></div>
          <div class="form-group"><label>담당자</label><input type="text" id="f-manager" placeholder="책임 담당자 또는 팀명"></div>
        </div>
        <div class="form-group">
          <label>밑작업 &amp; 준비물 체크리스트</label>
          <div class="checklist-input-row">
            <input type="text" id="cl-new-item" placeholder="항목 입력 후 추가 버튼 또는 Enter" onkeydown="if(event.key==='Enter'){event.preventDefault();addClItem()}">
            <button class="btn btn-sm" onclick="addClItem()">+ 추가</button>
          </div>
          <div id="cl-list"></div>
        </div>
        <div class="form-group">
          <label>이미지 / 그림판</label>
          <div class="img-tools">
            <button class="btn" onclick="openPaint(null,'create')">✏ 그림판 열기</button>
            <button class="btn" onclick="document.getElementById('img-up-create').click()">↑ 사진 불러와서 편집</button>
            <input type="file" id="img-up-create" accept="image/*" style="display:none" onchange="loadImgForPaint(this,'create')">
          </div>
          <div class="img-grid" id="create-img-grid"></div>
        </div>
        <button class="btn btn-accent btn-full" onclick="createTask()">업무 생성 →</button>
      </div>
    </div>

    <!-- 날짜 배정 -->
    <div class="page" id="page-list">
      <div class="page-title">날짜 배정 <span id="list-count"></span></div>
      <div class="stats">
        <div class="stat"><div class="stat-label">전체 업무</div><div class="stat-value" id="st-total">0</div></div>
        <div class="stat"><div class="stat-label">날짜 배정됨</div><div class="stat-value" id="st-dated">0</div></div>
        <div class="stat"><div class="stat-label">미배정</div><div class="stat-value" id="st-none">0</div></div>
      </div>
      <div class="filter-bar" style="display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:16px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r)">
        <div style="flex:1;min-width:200px">
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">공간</div>
          <div class="filter-group" id="space-filters" style="display:flex;gap:5px;flex-wrap:wrap"></div>
        </div>
        <div style="flex:1;min-width:200px">
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">작업자</div>
          <div class="filter-group" id="worker-filters" style="display:flex;gap:5px;flex-wrap:wrap"></div>
        </div>
        <div style="flex:1;min-width:180px">
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">날짜</div>
          <div class="filter-group" style="display:flex;gap:5px;flex-wrap:wrap">
            <button class="btn btn-sm" id="filter-all-btn" onclick="setDateFilter('all')">전체</button>
            <button class="btn btn-sm" id="filter-undated-btn" onclick="setDateFilter('undated')">미배정만</button>
            <button class="btn btn-sm" id="filter-dated-btn" onclick="setDateFilter('dated')">배정됨만</button>
          </div>
        </div>
      </div>
      <div id="task-list"></div>
    </div>

    <!-- 달력 -->
    <div class="page" id="page-calendar">
      <div class="page-title">달력 확인</div>
      <div id="cal-legend" class="cal-legend"></div>
      <div class="cal-wrap">
        <div class="cal-header">
          <div class="cal-month" id="cal-month-label"></div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm" onclick="changeMonth(-1)">‹</button>
            <button class="btn btn-sm" onclick="changeMonth(0)">오늘</button>
            <button class="btn btn-sm" onclick="changeMonth(1)">›</button>
          </div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div id="cal-detail"></div>
    </div>

  </div>
</div>

<!-- 날짜 배정 모달 -->
<div class="overlay" id="date-modal">
  <div class="modal">
    <div class="modal-title" id="date-modal-title">날짜 배정</div>
    <div class="form-group"><label>날짜</label><input type="date" id="date-input"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeDateModal()">취소</button>
      <button class="btn btn-accent" onclick="assignDate()">저장</button>
    </div>
  </div>
</div>

<!-- 논의 기록 모달 -->
<div class="overlay" id="disc-modal">
  <div class="modal" style="width:480px">
    <div class="modal-title" id="disc-modal-title">논의 기록</div>
    <div class="disc-thread" id="disc-thread"></div>
    <div class="form-group"><label>논의 내용</label><textarea id="disc-text" placeholder="회의 내용, 결정 사항, 메모 등..." style="min-height:90px"></textarea></div>
    <div class="form-group"><label>작성자</label><input type="text" id="disc-author" placeholder="이름"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeDiscModal()">닫기</button>
      <button class="btn btn-accent" onclick="addDisc()">추가</button>
    </div>
  </div>
</div>

<!-- 그림판 -->
<div class="paint-overlay" id="paint-overlay">
  <div class="paint-box">
    <div class="paint-toolbar">
      <button class="ptool active" id="ptool-pen" onclick="setPTool('pen')">펜</button>
      <button class="ptool" id="ptool-line" onclick="setPTool('line')">직선</button>
      <button class="ptool" id="ptool-rect" onclick="setPTool('rect')">사각형</button>
      <button class="ptool" id="ptool-circle" onclick="setPTool('circle')">원</button>
      <button class="ptool" id="ptool-arrow" onclick="setPTool('arrow')">화살표</button>
      <button class="ptool" id="ptool-text" onclick="setPTool('text')">텍스트</button>
      <button class="ptool" id="ptool-eraser" onclick="setPTool('eraser')">지우개</button>
      <div class="pdiv"></div>
      <input type="range" min="1" max="24" value="3" id="brush-size" style="width:60px" oninput="pBrushSize=+this.value;document.getElementById('brush-lbl').textContent=this.value+'px'">
      <span style="font-size:11px;color:var(--text3);min-width:28px" id="brush-lbl">3px</span>
      <div class="pdiv"></div>
      <div id="p-swatches" style="display:flex;gap:4px"></div>
      <input type="color" id="p-custom" value="#1a1917" style="width:22px;height:22px;padding:0;border:2px solid var(--border);border-radius:50%;cursor:pointer" oninput="setPColor(this.value)">
      <div style="flex:1"></div>
      <button class="ptool" onclick="undoPaint()">↩ 되돌리기</button>
      <button class="ptool" onclick="clearPaint()">전체 지우기</button>
    </div>
    <div class="paint-canvas-wrap">
      <canvas id="paint-canvas" width="640" height="400"></canvas>
    </div>
    <div class="paint-footer">
      <button class="btn" onclick="closePaint()">취소</button>
      <button class="btn btn-accent" onclick="savePaint()">이미지 저장</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// ★ 여기에 Apps Script 웹앱 URL을 붙여넣으세요
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzDKicsgLoc3CirT9uOLwgyj2HsTpcuHPmlEirMtO29igocA-uBubMA41TBxDdCHORkKg/exec';
// ============================================================

let tasks = [], calYear, calMonth;
let pendingDateId = null, pendingDiscId = null;
let createImgs = [], createChecklist = [];
let filterSpace = 'all', filterWorker = 'all', filterDate = 'all';

/* ── 상태 표시 ── */
function setStatus(msg, err) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  el.style.color = err ? '#f87171' : 'rgba(255,255,255,.35)';
}

/* ── API ── */
// GET (읽기) → JSONP, POST (쓰기) → fetch
// JSONP는 file://에서도 작동, fetch는 https://에서 CORS 없이 작동
function apiGet(action) {
  return new Promise((resolve, reject) => {
    const cb = '_cb' + Date.now();
    const sc = document.createElement('script');
    window[cb] = data => { delete window[cb]; sc.remove(); resolve(data); };
    sc.onerror   = () => { delete window[cb]; sc.remove(); reject(new Error('network')); };
    sc.src = GAS_URL + '?action=' + action + '&callback=' + cb;
    document.head.appendChild(sc);
  });
}
async function apiPost(body) {
  // fetch로 POST 전송 (데이터 크기 제한 없음)
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(body),
    headers: { 'Content-Type': 'text/plain' }
  });
  return res.json();
}

/* ── 로드 ── */
async function load() {
  const n = new Date(); calYear = n.getFullYear(); calMonth = n.getMonth();
  if (!GAS_URL) {
    setStatus('로컬 모드 (URL 미설정)', true);
    try { tasks = JSON.parse(localStorage.getItem('tl_tasks')) || []; } catch(e) { tasks = []; }
    return;
  }
  setStatus('불러오는 중...');
  try {
    const data = await apiGet('getAll');
    tasks = (data.tasks || []).map(t => {
      let d = t.date ? String(t.date).trim() : '';
      // "2026-04-28T..." → "2026-04-28"
      if (d) d = d.slice(0,10);
      // "Wed Apr 29" 같은 형식 → Date 파싱
      if (d && !/^\d{4}-\d{2}-\d{2}$/.test(d)) {
        const parsed = new Date(t.date);
        if (!isNaN(parsed)) {
          d = parsed.getFullYear() + '-' +
              String(parsed.getMonth()+1).padStart(2,'0') + '-' +
              String(parsed.getDate()).padStart(2,'0');
        } else {
          d = '';
        }
      }
      return { ...t, date: d || null };
    });
    setStatus('동기화 완료 · ' + new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setStatus('연결 오류 — 로컬 모드', true);
    try { tasks = JSON.parse(localStorage.getItem('tl_tasks')) || []; } catch(e2) { tasks = []; }
  }
}

/* ── 동기화 헬퍼 ── */
function localSave() { localStorage.setItem('tl_tasks', JSON.stringify(tasks)); }
async function syncCreate(task) {
  localSave();
  if (!GAS_URL) return;
  setStatus('저장 중...');
  try { await apiPost({ action:'create', task }); setStatus('저장됨 · ' + ts()); }
  catch(e) { setStatus('저장 오류 (로컬만)', true); }
}
async function syncUpdate(task) {
  localSave();
  if (!GAS_URL) return;
  setStatus('저장 중...');
  try { await apiPost({ action:'update', task }); setStatus('저장됨 · ' + ts()); }
  catch(e) { setStatus('저장 오류 (로컬만)', true); }
}
async function syncDelete(id) {
  localSave();
  if (!GAS_URL) return;
  setStatus('삭제 중...');
  try { await apiPost({ action:'delete', id }); setStatus('삭제됨 · ' + ts()); }
  catch(e) { setStatus('삭제 오류 (로컬만)', true); }
}
function ts() { return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }

/* ── 네비게이션 ── */
function goTo(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach((b,i) =>
    b.classList.toggle('active', ['create','list','calendar'][i] === name));
  if (name === 'list')     renderList();
  if (name === 'calendar') renderCalendar();
}

/* ── 업무 생성 ── */
async function createTask() {
  const content = document.getElementById('f-content').value.trim();
  if (!content) { alert('내용을 입력해 주세요.'); return; }
  const task = {
    id: Date.now(),
    title:   document.getElementById('f-title').value.trim(),
    space:   document.getElementById('f-space').value.trim(),
    zone:    document.getElementById('f-zone').value.trim(),
    content,
    worker:  document.getElementById('f-worker').value.trim(),
    manager: document.getElementById('f-manager').value.trim(),
    images:  [...createImgs],
    checklist: [...createChecklist],
    date: null, discussions: [],
    createdAt: new Date().toISOString()
  };
  tasks.push(task);
  ['f-title','f-space','f-zone','f-content','f-worker','f-manager'].forEach(id => document.getElementById(id).value = '');
  createImgs = [];
  createChecklist = [];
  document.getElementById('create-img-grid').innerHTML = '';
  document.getElementById('cl-list').innerHTML = '';
  document.getElementById('cl-new-item').value = '';
  goTo('list');
  await syncCreate(task);
}

/* ── 업무 삭제 ── */
async function delTask(id) {
  if (!confirm('이 업무를 삭제할까요?')) return;
  tasks = tasks.filter(t => t.id !== id);
  renderList();
  await syncDelete(id);
}

/* ── 날짜 배정/해제 ── */
function openDateModal(id) {
  pendingDateId = id;
  const t = tasks.find(t => t.id === id);
  document.getElementById('date-modal-title').textContent = t.content.slice(0,50);
  document.getElementById('date-input').value = t.date || '';
  document.getElementById('date-modal').classList.add('open');
}
function closeDateModal() { document.getElementById('date-modal').classList.remove('open'); }
async function assignDate() {
  const d = document.getElementById('date-input').value;
  if (!d) { alert('날짜를 선택하세요.'); return; }
  const t = tasks.find(t => t.id === pendingDateId);
  if (t) t.date = d;
  closeDateModal(); renderList();
  await syncUpdate(t);
}
async function clearDate(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.date = null; renderList(); await syncUpdate(t); }
}

/* ── 논의 기록 ── */
function openDiscModal(id) {
  pendingDiscId = id;
  const t = tasks.find(t => t.id === id);
  document.getElementById('disc-modal-title').textContent = t.content.slice(0,50);
  document.getElementById('disc-text').value = '';
  document.getElementById('disc-author').value = '';
  renderDiscThread(t);
  document.getElementById('disc-modal').classList.add('open');
}
function closeDiscModal() { document.getElementById('disc-modal').classList.remove('open'); }
function renderDiscThread(t) {
  const el = document.getElementById('disc-thread');
  if (!t.discussions || !t.discussions.length) {
    el.innerHTML = '<div style="font-size:13px;color:var(--text3);padding:8px 0">아직 논의 기록이 없습니다.</div>'; return;
  }
  el.innerHTML = t.discussions.map(d => `
    <div class="disc-bubble">
      <div class="disc-bubble-meta">${d.author ? esc(d.author) + ' · ' : ''}${d.at}</div>
      <div class="disc-bubble-text">${esc(d.text)}</div>
    </div>`).join('');
  el.scrollTop = el.scrollHeight;
}
async function addDisc() {
  const text = document.getElementById('disc-text').value.trim();
  if (!text) { alert('내용을 입력하세요.'); return; }
  const t = tasks.find(t => t.id === pendingDiscId);
  const now = new Date();
  t.discussions.push({
    text,
    author: document.getElementById('disc-author').value.trim(),
    at: `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`
  });
  document.getElementById('disc-text').value = '';
  renderDiscThread(t); renderList();
  await syncUpdate(t);
}

/* ── 필터 ── */
function setSpaceFilter(v)  { filterSpace = v;  renderList(); }
function setWorkerFilter(v) { filterWorker = v; renderList(); }
function setDateFilter(v)   { filterDate = v;   renderList(); }

function renderFilters() {
  const spaces = ['all', ...new Set(tasks.map(t => t.space).filter(Boolean))];
  document.getElementById('space-filters').innerHTML = spaces.map(s =>
    `<button class="btn btn-sm${filterSpace===s?' btn-accent':''}" onclick="setSpaceFilter('${s.replace(/'/g,"\\'")}')">` +
    esc(s==='all'?'전체':s) + '</button>'
  ).join('');
  const workers = ['all', ...new Set(tasks.map(t => t.worker).filter(Boolean))];
  document.getElementById('worker-filters').innerHTML = workers.map(w =>
    `<button class="btn btn-sm${filterWorker===w?' btn-accent':''}" onclick="setWorkerFilter('${w.replace(/'/g,"\\'")}')">` +
    esc(w==='all'?'전체':w) + '</button>'
  ).join('');
  ['all','undated','dated'].forEach(m => {
    const el = document.getElementById('filter-'+m+'-btn');
    if (el) el.className = 'btn btn-sm'+(filterDate===m?' btn-accent':'');
  });
}

/* ── 인라인 편집 ── */
async function saveInlineEdit(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.title   = document.getElementById('edit-title-'+id).value.trim();
  t.space   = document.getElementById('edit-space-'+id).value.trim();
  t.zone    = document.getElementById('edit-zone-'+id).value.trim();
  t.content = document.getElementById('edit-content-'+id).value.trim();
  t.worker  = document.getElementById('edit-worker-'+id).value.trim();
  t.manager = document.getElementById('edit-manager-'+id).value.trim();
  // 체크리스트는 실시간으로 t.checklist에 이미 반영됨
  renderList();
  await syncUpdate(t);
}
function toggleEdit(id) {
  const view = document.getElementById('view-'+id);
  const edit = document.getElementById('edit-'+id);
  const isEdit = edit.style.display !== 'none';
  view.style.display = isEdit ? '' : 'none';
  edit.style.display = isEdit ? 'none' : '';
  if (!isEdit) setTimeout(() => renderEditChecklist(id), 0);
}

/* ── 목록 렌더링 ── */
function renderList() {
  const total = tasks.length, dated = tasks.filter(t => t.date).length;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-dated').textContent = dated;
  document.getElementById('st-none').textContent  = total - dated;
  renderFilters();
  const c = document.getElementById('task-list');
  if (!tasks.length) {
    c.innerHTML = '<div class="empty"><strong>업무가 없습니다</strong>업무 생성 탭에서 새 업무를 추가하세요.</div>'; return;
  }
  let filtered = [...tasks];
  if (filterSpace  !== 'all') filtered = filtered.filter(t => t.space  === filterSpace);
  if (filterWorker !== 'all') filtered = filtered.filter(t => t.worker === filterWorker);
  if (filterDate === 'undated') filtered = filtered.filter(t => !t.date);
  if (filterDate === 'dated')   filtered = filtered.filter(t => !!t.date);
  document.getElementById('list-count').textContent = filtered.length !== total ? filtered.length+' / '+total+'건' : total+'건';
  if (!filtered.length) {
    c.innerHTML = '<div class="empty"><strong>해당하는 업무가 없습니다</strong>필터 조건을 바꿔보세요.</div>'; return;
  }
  const sorted = [...filtered].sort((a,b)=>{
    if(!a.date&&!b.date)return 0;if(!a.date)return-1;if(!b.date)return 1;
    return a.date.localeCompare(b.date);
  });
  const items = sorted.map(t => {
    const sc = t.space ? getSpaceColor(t.space) : null;
    const bl = sc ? 'border-left:4px solid '+sc.border+';' : '';
    return '<div class="task-item'+(t.date?' dated':'')+'" style="'+bl+'">' +

      '<div id="view-'+t.id+'">' +
        '<div class="task-title-bar">' +
          '<div style="flex:1;min-width:0">' +
            (t.title ? '<div class="task-title-text">'+esc(t.title)+'</div>' : '') +
            '<div class="task-meta" style="margin-top:'+(t.title?'6px':'0')+'">' +
              (t.space   ? '<span class="tag" style="'+(sc?'background:'+sc.bg+';color:'+sc.text+';border-color:'+sc.border:'')+'">'+esc(t.space)+'</span>' : '') +
              (t.zone    ? '<span class="tag">'+esc(t.zone)+'</span>' : '') +
              (t.worker  ? '<span class="tag">👷 '+esc(t.worker)+'</span>' : '') +
              (t.manager ? '<span class="tag">📋 '+esc(t.manager)+'</span>' : '') +
              '<span class="tag '+(t.date?'date-set':'date-none')+'">'+(t.date||'날짜 미정')+'</span>' +
            '</div>' +
          '</div>' +
          '<div class="task-actions">' +
            '<button class="btn btn-sm" onclick="openDateModal('+t.id+')">📅 날짜</button>' +
            (t.date ? '<button class="btn btn-sm btn-danger" onclick="clearDate('+t.id+')">해제</button>' : '') +
            '<button class="btn btn-sm" onclick="toggleEdit('+t.id+')">✏ 수정</button>' +
            '<button class="btn btn-sm btn-danger" onclick="delTask('+t.id+')">삭제</button>' +
          '</div>' +
        '</div>' +
        (t.content ? '<div class="task-content-text">'+esc(t.content)+'</div>' : '') +
        (t.images && t.images.length ?
          '<div class="task-section"><div class="task-section-label">이미지</div>' +
          '<div class="img-grid">'+t.images.map(p=>'<img class="img-thumb" src="'+p+'" onclick="openPaintEdit(this.src,'+t.id+')">').join('')+'</div>' +
          '<div style="display:flex;gap:6px;margin-top:8px">' +
            '<button class="btn btn-sm" onclick="openPaint(null,'+t.id+')">✏ 그림판</button>' +
            '<button class="btn btn-sm" onclick="uploadForTask('+t.id+')">↑ 사진 추가</button>' +
          '</div></div>'
          :
          '<div style="display:flex;gap:6px;margin-top:10px">' +
            '<button class="btn btn-sm" onclick="openPaint(null,'+t.id+')">✏ 그림판</button>' +
            '<button class="btn btn-sm" onclick="uploadForTask('+t.id+')">↑ 사진 추가</button>' +
          '</div>'
        ) +
        (t.checklist && t.checklist.length ? renderChecklistHtml(t.checklist, t.id) : '') +
        (t.discussions && t.discussions.length ?
          '<div class="task-section"><div class="task-section-label">논의 기록 '+t.discussions.length+'건</div>' +
          t.discussions.slice(-3).map(d=>
            '<div class="disc-bubble-preview">' +
              '<div class="disc-bubble-preview-meta">'+(d.author?'<strong>'+esc(d.author)+'</strong> · ':'')+d.at+'</div>' +
              '<div class="disc-bubble-preview-text">'+esc(d.text)+'</div>' +
            '</div>'
          ).join('') +
          (t.discussions.length>3 ? '<div style="font-size:11px;color:var(--text3);margin-top:4px">+ '+(t.discussions.length-3)+'건 더 있음</div>' : '') +
          '<button class="btn btn-sm" style="margin-top:8px" onclick="openDiscModal('+t.id+')">+ 논의 추가</button>' +
          '</div>'
          :
          '<div style="margin-top:10px"><button class="btn btn-sm" onclick="openDiscModal('+t.id+')">💬 논의 추가</button></div>'
        ) +
      '</div>' +

      '<div id="edit-'+t.id+'" style="display:none">' +
        '<div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px">✏ 업무 수정</div>' +
        '<div class="form-group"><label>제목</label><input class="edit-field" id="edit-title-'+t.id+'" type="text" value="'+esc(t.title||'')+'" placeholder="달력에 표시될 짧은 이름" maxlength="20"></div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' +
          '<div class="form-group"><label>공간</label><input class="edit-field" id="edit-space-'+t.id+'" type="text" value="'+esc(t.space||'')+'"></div>' +
          '<div class="form-group"><label>Zone</label><input class="edit-field" id="edit-zone-'+t.id+'" type="text" value="'+esc(t.zone||'')+'"></div>' +
        '</div>' +
        '<div class="form-group"><label>내용</label><textarea class="edit-field" id="edit-content-'+t.id+'" style="min-height:80px">'+esc(t.content||'')+'</textarea></div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' +
          '<div class="form-group"><label>작업자</label><input class="edit-field" id="edit-worker-'+t.id+'" type="text" value="'+esc(t.worker||'')+'"></div>' +
          '<div class="form-group"><label>담당자</label><input class="edit-field" id="edit-manager-'+t.id+'" type="text" value="'+esc(t.manager||'')+'"></div>' +
        '</div>' +
        '<div class="form-group" style="margin-top:10px"><label>체크리스트</label>' +
          '<div id="edit-cl-list-'+t.id+'"></div>' +
          '<div class="checklist-input-row" style="margin-top:6px">' +
            '<input type="text" class="edit-field" id="edit-cl-new-'+t.id+'" placeholder="항목 추가 후 Enter" style="font-size:12px;padding:6px 8px" onkeydown="if(event.key===&apos;Enter&apos;){event.preventDefault();addEditClItem('+t.id+')}">' +
            '<button class="btn btn-sm" onclick="addEditClItem('+t.id+')">+ 추가</button>' +
          '</div>' +
        '</div>' +
        '<div style="display:flex;gap:8px;margin-top:4px">' +
          '<button class="btn btn-accent btn-sm" onclick="saveInlineEdit('+t.id+')">저장</button>' +
          '<button class="btn btn-sm" onclick="toggleEdit('+t.id+')">취소</button>' +
        '</div>' +
      '</div>' +

    '</div>';
  }).join('');
  c.innerHTML = '<div class="task-grid">' + items + '</div>';
}

const SPACE_COLORS = [
  {bg:'#dbeafe',border:'#93c5fd',text:'#1e40af'},
  {bg:'#fce7f3',border:'#f9a8d4',text:'#9d174d'},
  {bg:'#dcfce7',border:'#86efac',text:'#166534'},
  {bg:'#fef9c3',border:'#fde047',text:'#854d0e'},
  {bg:'#ede9fe',border:'#c4b5fd',text:'#5b21b6'},
  {bg:'#ffedd5',border:'#fdba74',text:'#9a3412'},
  {bg:'#cffafe',border:'#67e8f9',text:'#155e75'},
  {bg:'#fce7f3',border:'#f9a8d4',text:'#831843'},
  {bg:'#f0fdf4',border:'#bbf7d0',text:'#14532d'},
  {bg:'#fef2f2',border:'#fca5a5',text:'#991b1b'},
];
const spaceColorMap = {};
function getSpaceColor(space) {
  if (!space) return null;
  if (!spaceColorMap[space]) {
    const keys = Object.keys(spaceColorMap).length;
    spaceColorMap[space] = SPACE_COLORS[keys % SPACE_COLORS.length];
  }
  return spaceColorMap[space];
}
function buildSpaceColorMap() {
  // 먼저 기존 공간들 순서대로 색 배정
  const spaces = [...new Set(tasks.map(t => t.space).filter(Boolean))];
  spaces.forEach(s => getSpaceColor(s));
}

function renderCalLegend() {
  const spaces = [...new Set(tasks.filter(t => t.date).map(t => t.space).filter(Boolean))];
  if (!spaces.length) { document.getElementById('cal-legend').innerHTML = ''; return; }
  document.getElementById('cal-legend').innerHTML =
    spaces.map(s => {
      const c = getSpaceColor(s);
      return `<div class="cal-legend-item"><div class="cal-legend-dot" style="background:${c.bg};border:1.5px solid ${c.border}"></div>${esc(s)}</div>`;
    }).join('');
}

/* ── 달력 ── */
function renderCalendar() {
  buildSpaceColorMap();
  document.getElementById('cal-month-label').textContent = `${calYear}년 ${calMonth+1}월`;
  renderCalLegend();
  const grid = document.getElementById('cal-grid');
  const dows = ['일','월','화','수','목','금','토'];
  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');
  const first = new Date(calYear, calMonth, 1).getDay();
  const last  = new Date(calYear, calMonth+1, 0).getDate();
  const pLast = new Date(calYear, calMonth, 0).getDate();
  const todayStr = new Date().toISOString().slice(0,10);
  // 이전 달 날짜
  const prevYear = calMonth === 0 ? calYear-1 : calYear;
  const prevMonth = calMonth === 0 ? 12 : calMonth;
  for (let i = 0; i < first; i++) {
    const d = pLast - first + 1 + i;
    const ds = `${prevYear}-${String(prevMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt = tasks.filter(t => t.date === ds);
    const spaces = [...new Set(dt.map(t => t.space).filter(Boolean))];
    let bgStyle = 'opacity:.55;';
    if (spaces.length === 1) {
      const c = getSpaceColor(spaces[0]);
      bgStyle = `background:${c.bg};border:1.5px solid ${c.border};opacity:.55;`;
    } else if (spaces.length > 1) {
      const cols = spaces.slice(0,4).map(s => getSpaceColor(s).bg);
      const step = 100/cols.length;
      const stops = cols.map((c,i) => `${c} ${i*step}%, ${c} ${(i+1)*step}%`).join(', ');
      bgStyle = `background:linear-gradient(135deg,${stops});border:1.5px solid #cbd5e1;opacity:.55;`;
    }
    const chips = dt.map(t => {
      const c = t.space ? getSpaceColor(t.space) : {bg:'#f0efe9',border:'#ccc9be',text:'#6b6860'};
      const label = t.title ? t.title : (t.content ? t.content.slice(0,10) : '업무');
      return `<span class="space-chip" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">${esc(label)}</span>`;
    }).join('');
    html += `<div class="cal-cell other" style="${bgStyle}" onclick="showCalDay('${ds}')">
      <div class="cal-day" style="color:var(--text3)">${d}</div>
      ${chips}
    </div>`;
  }

  // 이번 달 날짜
  for (let d = 1; d <= last; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt = tasks.filter(t => t.date === ds);
    const spaces = [...new Set(dt.map(t => t.space).filter(Boolean))];
    let bgStyle = '';
    if (spaces.length === 1) {
      const c = getSpaceColor(spaces[0]);
      bgStyle = `background:${c.bg};border:1.5px solid ${c.border};`;
    } else if (spaces.length > 1) {
      const cols = spaces.slice(0,4).map(s => getSpaceColor(s).bg);
      const step = 100/cols.length;
      const stops = cols.map((c,i) => `${c} ${i*step}%, ${c} ${(i+1)*step}%`).join(', ');
      bgStyle = `background:linear-gradient(135deg,${stops});border:1.5px solid #cbd5e1;`;
    }
    const chips = dt.map(t => {
      const c = t.space ? getSpaceColor(t.space) : {bg:'#f0efe9',border:'#ccc9be',text:'#6b6860'};
      const label = t.title ? t.title : (t.content ? t.content.slice(0,10) : '업무');
      return `<span class="space-chip" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">${esc(label)}</span>`;
    }).join('');
    const holiday = getHoliday(ds);
    const dow = new Date(ds).getDay();
    const holidayClass = holiday ? ' holiday' : (dow===0 ? ' sunday' : dow===6 ? ' saturday' : '');
    html += `<div class="cal-cell${ds===todayStr?' today':''}${holidayClass}" style="${bgStyle}" onclick="showCalDay('${ds}')">
      <div class="cal-day">${d}</div>
      ${holiday ? `<div class="holiday-name">${holiday}</div>` : ''}
      ${chips}
    </div>`;
  }

  // 다음 달 날짜
  const nextYear = calMonth === 11 ? calYear+1 : calYear;
  const nextMonth = calMonth === 11 ? 1 : calMonth+2;
  const rem = (7 - (first+last)%7)%7;
  for (let d = 1; d <= rem; d++) {
    const ds = `${nextYear}-${String(nextMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt = tasks.filter(t => t.date === ds);
    const spaces = [...new Set(dt.map(t => t.space).filter(Boolean))];
    let bgStyle = 'opacity:.55;';
    if (spaces.length === 1) {
      const c = getSpaceColor(spaces[0]);
      bgStyle = `background:${c.bg};border:1.5px solid ${c.border};opacity:.55;`;
    } else if (spaces.length > 1) {
      const cols = spaces.slice(0,4).map(s => getSpaceColor(s).bg);
      const step = 100/cols.length;
      const stops = cols.map((c,i) => `${c} ${i*step}%, ${c} ${(i+1)*step}%`).join(', ');
      bgStyle = `background:linear-gradient(135deg,${stops});border:1.5px solid #cbd5e1;opacity:.55;`;
    }
    const chips = dt.map(t => {
      const c = t.space ? getSpaceColor(t.space) : {bg:'#f0efe9',border:'#ccc9be',text:'#6b6860'};
      const label = t.title ? t.title : (t.content ? t.content.slice(0,10) : '업무');
      return `<span class="space-chip" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">${esc(label)}</span>`;
    }).join('');
    html += `<div class="cal-cell other" style="${bgStyle}" onclick="showCalDay('${ds}')">
      <div class="cal-day" style="color:var(--text3)">${d}</div>
      ${chips}
    </div>`;
  }
  grid.innerHTML = html;
  document.getElementById('cal-detail').innerHTML = '';
}

function updateSelToolbar(ds) {
  const checked = document.querySelectorAll(`input[type=checkbox][data-date="${ds}"]:checked`);
  const toolbar = document.getElementById('sel-toolbar-'+ds);
  const countEl = document.getElementById('sel-count-'+ds);
  if (checked.length > 0) {
    toolbar.style.display = 'flex';
    countEl.textContent = checked.length + '건 선택됨';
  } else {
    toolbar.style.display = 'none';
  }
}

function clearSelections(ds) {
  document.querySelectorAll(`input[type=checkbox][data-date="${ds}"]`).forEach(cb => cb.checked = false);
  document.getElementById('sel-toolbar-'+ds).style.display = 'none';
}

async function selMoveDate(ds) {
  const newDate = document.getElementById('sel-move-date-'+ds).value;
  if (!newDate) { alert('이동할 날짜를 선택하세요.'); return; }
  if (newDate === ds) { alert('같은 날짜입니다.'); return; }
  const checked = [...document.querySelectorAll(`input[type=checkbox][data-date="${ds}"]:checked`)];
  if (!checked.length) { alert('업무를 선택해 주세요.'); return; }
  const ids = checked.map(cb => +cb.id.replace('chk-',''));
  const targets = tasks.filter(t => ids.includes(t.id));
  if (!confirm(`선택한 업무 ${targets.length}건을 ${newDate}로 이동할까요?`)) return;
  for (const t of targets) t.date = newDate;
  renderCalendar();
  showCalDay(newDate);
  for (const t of targets) await syncUpdate(t);
}
async function calChangeDate(id, newDate) {
  if (!newDate) return;
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const prevDate = t.date;
  t.date = newDate;
  renderCalendar();
  // 날짜가 바뀌면 새 날짜로 상세 패널 갱신
  showCalDay(newDate);
  await syncUpdate(t);
}
async function bulkMoveDate(fromDate) {
  const newDate = document.getElementById('bulk-move-date').value;
  if (!newDate) { alert('이동할 날짜를 선택하세요.'); return; }
  if (newDate === fromDate) { alert('같은 날짜입니다.'); return; }
  const targets = tasks.filter(t => t.date === fromDate);
  if (!targets.length) return;
  if (!confirm(`${fromDate}의 업무 ${targets.length}건을 ${newDate}로 이동할까요?`)) return;
  for (const t of targets) { t.date = newDate; }
  renderCalendar();
  showCalDay(newDate);
  for (const t of targets) { await syncUpdate(t); }
}

async function calClearDate(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.date = null;
  renderCalendar();
  await syncUpdate(t);
}
function changeMonth(d) {
  if (d===0) { const n=new Date(); calYear=n.getFullYear(); calMonth=n.getMonth(); }
  else { calMonth+=d; if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;} }
  renderCalendar();
}

function initPaint() {
  pCanvas = document.getElementById('paint-canvas');

  pCanvas.onmousedown = e => pdDown(e.offsetX, e.offsetY);
  pCanvas.onmousemove = e => pdMove(e.offsetX, e.offsetY);

  pCanvas.ontouchstart = e => { e.preventDefault(); const r=pCanvas.getBoundingClientRect(),t=e.touches[0]; pdDown(t.clientX-r.left,t.clientY-r.top); },{passive:false};
  pCanvas.ontouchmove  = e => { e.preventDefault(); const r=pCanvas.getBoundingClientRect(),t=e.touches[0]; pdMove(t.clientX-r.left,t.clientY-r.top); },{passive:false};
  pCanvas.ontouchend   = () => { pDrawing = false; };
  document.getElementById('p-swatches').innerHTML =
    PSWATCHES.map(c => `<div class="swatch${c===pColor?' active':''}" style="background:${c};${c==='#ffffff'?'border:1.5px solid var(--border);':''}" onclick="setPColor('${c}')"></div>`).join('');
}
function setPTool(t) {
  pTool = t;
  document.querySelectorAll('.ptool').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('ptool-'+t);
  if (el) el.classList.add('active');
}
function setPColor(c) {
  pColor = c;
  document.querySelectorAll('.swatch').forEach(s => {
    s.classList.toggle('active', s.style.background===c || s.style.background===hexRgb(c));
  });
  document.getElementById('p-custom').value = c;
}
function hexRgb(h) {
  if (!h||h[0]!=='#') return h;
  return `rgb(${parseInt(h.slice(1,3),16)}, ${parseInt(h.slice(3,5),16)}, ${parseInt(h.slice(5,7),16)})`;
}
function pdDown(x, y) {
  pDrawing=true; pSX=x; pSY=y;
  pHistory.push(pCtx.getImageData(0,0,pCanvas.width,pCanvas.height));
  if (pHistory.length>40) pHistory.shift();
  pSnap = pCtx.getImageData(0,0,pCanvas.width,pCanvas.height);
  if (pTool==='text') {
    pDrawing=false;
    const txt=prompt('텍스트 입력:');
    if (txt) { pCtx.font=`${Math.max(14,pBrushSize*5)}px 'Noto Sans KR',sans-serif`; pCtx.fillStyle=pColor; pCtx.fillText(txt,x,y); }
    return;
  }
  if (pTool==='pen'||pTool==='eraser') { pCtx.beginPath(); pCtx.moveTo(x,y); }
}
function pdMove(x, y) {
  if (!pDrawing) return;
  if (pTool==='pen') {
    pCtx.strokeStyle=pColor; pCtx.lineWidth=pBrushSize; pCtx.lineCap='round'; pCtx.lineJoin='round';
    pCtx.lineTo(x,y); pCtx.stroke();
  } else if (pTool==='eraser') {
    pCtx.strokeStyle='#ffffff'; pCtx.lineWidth=pBrushSize*3; pCtx.lineCap='round';
    pCtx.lineTo(x,y); pCtx.stroke();
  } else {
    pCtx.putImageData(pSnap,0,0);
    pCtx.strokeStyle=pColor; pCtx.lineWidth=pBrushSize; pCtx.beginPath();
    if (pTool==='line')   { pCtx.moveTo(pSX,pSY); pCtx.lineTo(x,y); pCtx.stroke(); }
    if (pTool==='rect')   { pCtx.strokeRect(pSX,pSY,x-pSX,y-pSY); }
    if (pTool==='circle') { const rx=(x-pSX)/2,ry=(y-pSY)/2; pCtx.ellipse(pSX+rx,pSY+ry,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2); pCtx.stroke(); }
    if (pTool==='arrow')  {
      pCtx.moveTo(pSX,pSY); pCtx.lineTo(x,y); pCtx.stroke();
      const a=Math.atan2(y-pSY,x-pSX), len=12+pBrushSize;
      pCtx.beginPath();
      pCtx.moveTo(x,y); pCtx.lineTo(x-len*Math.cos(a-.45),y-len*Math.sin(a-.45));
      pCtx.moveTo(x,y); pCtx.lineTo(x-len*Math.cos(a+.45),y-len*Math.sin(a+.45));
      pCtx.stroke();
    }
  }
}
function undoPaint() { if (pHistory.length>0) pCtx.putImageData(pHistory.pop(),0,0); }
function clearPaint() { pCtx.clearRect(0,0,pCanvas.width,pCanvas.height); pCtx.fillStyle='#ffffff'; pCtx.fillRect(0,0,pCanvas.width,pCanvas.height); pHistory=[]; }

function openPaint(bgUrl, target) {
  paintSaveTarget = target;
  document.getElementById('paint-overlay').classList.add('open');
  setTimeout(() => {
    initPaint(); clearPaint();
    if (bgUrl) {
      const img=new Image();
      img.onload=()=>{ const cw=pCanvas.width,ch=pCanvas.height,s=Math.min(cw/img.width,ch/img.height); pCtx.drawImage(img,(cw-img.width*s)/2,(ch-img.height*s)/2,img.width*s,img.height*s); };
      img.src=bgUrl;
    }
  }, 50);
}
function openPaintEdit(src, id) { openPaint(src, id); }
function closePaint() { document.getElementById('paint-overlay').classList.remove('open'); }
async function savePaint() {
  const dataUrl = pCanvas.toDataURL('image/png');
  if (paintSaveTarget === 'create') {
    createImgs.push(dataUrl);
    const g=document.getElementById('create-img-grid');
    const img=document.createElement('img'); img.className='img-thumb'; img.src=dataUrl; g.appendChild(img);
  } else {
    const t=tasks.find(t=>t.id===paintSaveTarget);
    if (t) { if (!t.images) t.images=[]; t.images.push(dataUrl); renderList(); await syncUpdate(t); }
  }
  closePaint();
}
function loadImgForPaint(input, target) {
  const file=input.files[0]; if (!file) return;
  const r=new FileReader(); r.onload=e=>openPaint(e.target.result,target); r.readAsDataURL(file); input.value='';
}
function uploadForTask(id) {
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>openPaint(ev.target.result,id); r.readAsDataURL(f); };
  inp.click();
}

/* ── 체크리스트 (생성 폼용) ── */
function renderCreateChecklist() {
  const el = document.getElementById('cl-list');
  if (!createChecklist.length) { el.innerHTML = ''; return; }
  const done = createChecklist.filter(i=>i.done).length;
  el.innerHTML =
    `<div class="cl-progress">완료 <span>${done}/${createChecklist.length}</span></div>` +
    createChecklist.map((item, idx) => `
      <div class="checklist-item${item.done?' done':''}">
        <input type="checkbox" class="cl-check" ${item.done?'checked':''} onchange="toggleCreateCl(${idx})">
        <span class="cl-text">${esc(item.text)}</span>
        <button class="cl-del" onclick="delCreateCl(${idx})">✕</button>
      </div>`).join('');
}
function addClItem() {
  const inp = document.getElementById('cl-new-item');
  const text = inp.value.trim();
  if (!text) return;
  createChecklist.push({ text, done: false });
  inp.value = '';
  renderCreateChecklist();
  inp.focus();
}
function toggleCreateCl(idx) {
  createChecklist[idx].done = !createChecklist[idx].done;
  renderCreateChecklist();
}
function delCreateCl(idx) {
  createChecklist.splice(idx, 1);
  renderCreateChecklist();
}

/* ── 체크리스트 (카드용) ── */
function renderChecklistHtml(checklist, taskId) {
  if (!checklist || !checklist.length) return '';
  const done = checklist.filter(i=>i.done).length;
  const pct = Math.round(done/checklist.length*100);
  const items = checklist.map((item,idx) =>
    '<div class="checklist-item'+(item.done?' done':'')+'">' +
      '<input type="checkbox" class="cl-check" '+(item.done?'checked':'')+' onchange="toggleTaskCl('+taskId+','+idx+')">' +
      '<span class="cl-text">'+esc(item.text)+'</span>' +
    '</div>'
  ).join('');
  return '<div class="task-section">' +
    '<div class="task-section-label">체크리스트 <span style="font-weight:400;color:var(--text3)">'+done+'/'+checklist.length+' · '+pct+'%</span></div>' +
    '<div style="height:4px;background:var(--border);border-radius:2px;margin-bottom:8px;overflow:hidden">' +
      '<div style="height:100%;width:'+pct+'%;background:var(--accent);border-radius:2px;transition:width .3s"></div>' +
    '</div>' +
    items +
  '</div>';
}
async function toggleTaskCl(taskId, idx) {
  const t = tasks.find(t => t.id === taskId);
  if (!t || !t.checklist) return;
  t.checklist[idx].done = !t.checklist[idx].done;
  renderList();
  await syncUpdate(t);
}

/* ── 체크리스트 (인라인 편집용) ── */
function renderEditChecklist(taskId) {
  const t = tasks.find(t => t.id === taskId);
  const checklist = t.checklist || [];
  const el = document.getElementById('edit-cl-list-'+taskId);
  if (!el) return;
  el.innerHTML = checklist.map((item,idx) => `
    <div class="checklist-item">
      <span class="cl-text">${esc(item.text)}</span>
      <button class="cl-del" onclick="delEditCl(${taskId},${idx})">✕</button>
    </div>`).join('');
}
function addEditClItem(taskId) {
  const inp = document.getElementById('edit-cl-new-'+taskId);
  const text = inp.value.trim();
  if (!text) return;
  const t = tasks.find(t => t.id === taskId);
  if (!t.checklist) t.checklist = [];
  t.checklist.push({ text, done: false });
  inp.value = '';
  renderEditChecklist(taskId);
}
function delEditCl(taskId, idx) {
  const t = tasks.find(t => t.id === taskId);
  if (!t.checklist) return;
  t.checklist.splice(idx, 1);
  renderEditChecklist(taskId);
}

function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

load();
</script>
